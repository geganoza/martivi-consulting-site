<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8">
  
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Thank You • Message Received</title>

  <!-- Open Graph (nice when shared) -->
  <meta property="og:title" content="Thank You • Message Received">
  <meta property="og:description" content="Your message has been received. Our team will contact you soon.">
  <meta property="og:type" content="website">

  <style>
    :root{
      --bg1:#0e2333;         /* deep slate */
      --bg2:#0f4a5b;         /* teal navy */
      --brand:#1390ac;       /* your brand teal */
      --brand-2:#10a6c6;     /* lighter teal */
      --ink:#12324C;         /* brand ink */
      --card:#ffffff;
      --muted:#597082;
      --ring: rgba(19,144,172,0.35);
      --shadow: 0 20px 50px rgba(0,0,0,.25);
      --radius: 22px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(1200px 800px at 10% 10%, rgba(255,255,255,0.06), transparent 60%),
        radial-gradient(1000px 700px at 90% 20%, rgba(255,255,255,0.05), transparent 60%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--ink);
      display:grid;
      place-items:center;
      overflow:hidden;
    }

    /* Confetti layer */
    .confetti{
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .card{
      position:relative;
      z-index:1;
      width:min(96vw, 720px);
      background: linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0.75));
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(20px, 4vw, 42px);
      text-align:center;
      animation: rise .7s ease-out;
    }
    @keyframes rise{from{transform: translateY(10px); opacity:0} to{transform:none; opacity:1}}

    .badge{
      height: 78px; width:78px; margin:0 auto 18px;
      display:grid; place-items:center;
      border-radius: 22px;
      background:
        radial-gradient(60% 60% at 70% 30%, rgba(255,255,255,.7), rgba(255,255,255,.15)),
        linear-gradient(135deg, var(--brand), var(--brand-2));
      box-shadow: 0 12px 30px rgba(16,166,198,.35), inset 0 1px 0 rgba(255,255,255,.6);
    }

    /* Animated checkmark */
    .check{
      width:38px; height:38px;
      display:block;
    }
    .check path{
      stroke:#fff; stroke-width:5; fill:none; stroke-linecap:round; stroke-linejoin:round;
      stroke-dasharray: 120; stroke-dashoffset: 120;
      animation: draw .8s ease-out .2s forwards;
    }
    @keyframes draw{to{stroke-dashoffset:0}}

    h1{
      margin: 10px 0 10px;
      font-size: clamp(24px, 3.6vw, 34px);
      line-height:1.1;
      color: var(--ink);
      letter-spacing:.2px;
    }
    p.lead{
      margin:0 0 8px;
      font-size: clamp(16px, 2.2vw, 18px);
      color:#274b66;
    }
    p.muted{
      margin:8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .meta{
      margin-top:18px;
      display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
      color: var(--muted);
      font-size: 13px;
    }
    .chip{
      border: 1px solid rgba(19,144,172,.25);
      background: rgba(19,144,172,.08);
      padding: 6px 10px;
      border-radius: 999px;
    }

    .actions{
      margin-top: 26px;
      display:flex; gap:12px; justify-content:center; flex-wrap:wrap;
    }
    .btn{
      appearance:none; border:none; cursor:pointer;
      padding: 12px 18px; border-radius: 14px; font-weight: 600;
      transition: transform .08s ease, box-shadow .2s ease, background .2s;
    }
    .btn:active{ transform: translateY(1px) }
    .btn-primary{
      color:#fff; background: linear-gradient(135deg, var(--brand), var(--brand-2));
      box-shadow: 0 10px 25px rgba(16,166,198,.35);
    }
    .btn-primary:hover{ filter: brightness(1.05) }
    .btn-ghost{
      color: var(--brand);
      background: rgba(19,144,172,.1);
      border: 1px solid rgba(19,144,172,.25);
    }

    footer{
      position: fixed; inset-inline:0; bottom:12px; text-align:center;
      color: rgba(255,255,255,.7); font-size:12px;
    }

    /* Confetti pieces */
    .piece{
      position:absolute; top:-20px; width:10px; height:14px; opacity:.95;
      transform: translateY(-100px) rotate(0deg);
      animation: fall linear forwards;
    }
    @keyframes fall{
      to{ transform: translateY(120vh) rotate(720deg); opacity:1 }
    }
  </style>
</head>
<body>

  <!-- Confetti (generated by JS below) -->
  <div class="confetti" id="confetti"></div>

  <main class="card" role="main" aria-labelledby="ty-title">
    <div class="badge" aria-hidden="true">
      <svg class="check" viewBox="0 0 64 64">
        <path d="M16 34 L28 46 L50 22" />
      </svg>
    </div>

    <h1 id="ty-title">Thank you — we’ve got your message!</h1>
    <p class="lead">Your message was sent successfully. Our team will get back to you shortly.</p>
    <p class="muted">We typically respond within one business day.</p>

    <div class="meta" aria-hidden="true">
      <span class="chip">Ticket created</span>
      <span class="chip">Email confirmation sent</span>
      <span class="chip">Priority: Normal</span>
    </div>

    <div class="actions">
      <a class="btn btn-primary" href="/">Back to Home</a>
      <a class="btn btn-ghost" href="mailto:leads@martiviconsulting.com">Send Email</a>
    </div>
  </main>

  <footer>© <span id="y"></span> MARTIVI DIGITAL • All rights reserved</footer>

  <script>
    // Year
    document.getElementById('y').textContent = new Date().getFullYear();

    // Minimal confetti generator (no dependencies)
    (function(){
      const colors = ['#1390ac', '#10a6c6', '#12b3d8', '#f8b84a', '#e85d75', '#7fd1ae'];
      const parent = document.getElementById('confetti');
      const pieces = Math.min(120, Math.max(60, Math.floor(window.innerWidth / 10)));

      for (let i = 0; i < pieces; i++){
        const el = document.createElement('span');
        el.className = 'piece';
        const color = colors[i % colors.length];
        const left = Math.random() * 100;
        const delay = Math.random() * 0.9;
        const dur = 3 + Math.random() * 2.2;
        const skew = -25 + Math.random() * 50;
        el.style.left = left + 'vw';
        el.style.background = color;
        el.style.transform = `translateY(-100px) rotate(${skew}deg)`;
        el.style.animationDuration = dur + 's';
        el.style.animationDelay = delay + 's';
        el.style.borderRadius = (Math.random() > .5 ? '2px' : '999px');
        parent.appendChild(el);
      }

      // Auto-clean confetti after a while
      setTimeout(() => parent.remove(), 7000);
    })();
  </script>
</body>
</html>
